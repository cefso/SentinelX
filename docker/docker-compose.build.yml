# =============================================================================
# SentinelX 全栈本地构建 - Docker Compose 配置文件
# =============================================================================
# 使用说明 (需要在 docker/ 目录下执行):
#   构建:         cd docker && docker compose -f docker-compose.build.yml build
#   启动全栈:     cd docker && docker compose -f docker-compose.build.yml up -d --build
#   停止服务:     cd docker && docker compose -f docker-compose.build.yml down
#   带管理工具:   cd docker && docker compose -f docker-compose.build.yml --profile tools up -d --build
# =============================================================================

services:
  backend:
    extends:
      file: docker-compose.yml
      service: backend
    build:
      context: ..
      dockerfile: docker/Dockerfile

  frontend:
    extends:
      file: docker-compose.yml
      service: frontend
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend

  postgres:
    extends:
      file: docker-compose.yml
      service: postgres
    build:
      context: .
      dockerfile: Dockerfile.pg

  redis:
    extends:
      file: docker-compose.yml
      service: redis

  pgadmin:
    extends:
      file: docker-compose.yml
      service: pgadmin

  redis-commander:
    extends:
      file: docker-compose.yml
      service: redis-commander

networks:
  sentinelx-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  pgadmin_data:
    driver: local
