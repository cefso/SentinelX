# =============================================================================
# SentinelX 综合告警平台 - Docker Compose 配置文件
# =============================================================================
# 使用说明:
#   1. 启动完整服务: docker compose up -d
#   2. 带管理工具: docker compose --profile tools up -d
#   3. 查看日志: docker compose logs -f [service_name]
#   4. 停止服务: docker compose down
#   5. 清理数据: docker compose down -v (会删除所有数据!)
#
# 注意: 后端和前端默认使用 GitHub Packages 镜像运行
#       如需本地构建: docker compose up -d --build
#
# 自定义配置:
#   复制 .env.example 为 .env.docker，修改后运行:
#   docker compose --env-file ./docker/.env.docker up -d
# =============================================================================

services:
  # ============================================================================
  # Backend API 后端服务
  # ============================================================================
  # 注意: 本地开发时，后端直接在本地运行，不使用 Docker
  # 本地开发命令: cd backend && uvicorn main:app --reload
  backend:
    image: ghcr.io/cefso/sentinelx/backend:latest
    container_name: sentinelx-backend
    ports:
      - "8001:8000"
      - "5678:5678"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: sentinelx
      REDIS_HOST: redis
      REDIS_PORT: 6379
      DEBUG: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    volumes:
      - ../backend:/app
    networks:
      - sentinelx-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    labels:
      service: "sentinelx-backend"
    working_dir: /app
    command: >
      sh -c "
        alembic upgrade head &&
        uvicorn main:app --host 0.0.0.0 --port 8000 --reload --log-level info
      "

  # ============================================================================
  # Frontend 前端应用
  # ============================================================================
  # 注意: 本地开发时，前端直接在本地运行，不使用 Docker
  # 本地开发命令: cd frontend && npm run dev
  frontend:
    image: ghcr.io/cefso/sentinelx/frontend:latest
    container_name: sentinelx-frontend
    ports:
      - "3000:3000"
    environment:
      VITE_API_BASE_URL: /api
      VITE_API_PROXY_TARGET: http://sentinelx-backend:8000
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    volumes:
      - ../frontend:/app
      - /app/node_modules
    networks:
      - sentinelx-network
    command: npm run dev -- --host
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      service: "sentinelx-frontend"

  # ============================================================================
  # PostgreSQL + TimescaleDB 数据库
  # ============================================================================
  postgres:
    build:
      context: ./postgres
      dockerfile: Dockerfile
    image: sentinelx/postgres:latest
    container_name: sentinelx-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sentinelx
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sentinelx-network

  # ============================================================================
  # Redis 缓存服务器 (完整部署时使用)
  # ============================================================================
  redis:
    image: redis:7-alpine
    container_name: sentinelx-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sentinelx-network

  # ============================================================================
  # pgAdmin 数据库管理工具 (可选)
  # ============================================================================
  # 使用方式: docker-compose --profile tools up -d
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: sentinelx-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@sentinelx.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - tools
    networks:
      - sentinelx-network

  # ============================================================================
  # Redis Commander Redis管理工具 (可选)
  # ============================================================================
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: sentinelx-redis-commander
    environment:
      REDIS_HOSTS: local:redis:6379
    ports:
      - "8081:8081"
    depends_on:
      - redis
    profiles:
      - tools
    networks:
      - sentinelx-network

# =============================================================================
# Docker 网络配置
# =============================================================================
networks:
  sentinelx-network:
    driver: bridge

# =============================================================================
# Docker 卷配置
# =============================================================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local