name: CI

on:
  push:
    branches: [main, develop]
    tags: ['v*']
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PYTHON_VERSION: '3.11'

jobs:
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      docker: ${{ steps.filter.outputs.docker }}
      helm: ${{ steps.filter.outputs.helm }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'docker/Dockerfile.pg'
              - 'docker/init-db.sh'
              - 'docker/pgmq.sql'
            frontend:
              - 'frontend/**'
            docker:
              - 'docker/**'
              - 'backend/**'
              - 'frontend/**'
            helm:
              - 'helm/**'

  # ============ 后端测试 ============
  backend-test:
    needs: changes
    if: |
      github.event_name != 'pull_request' ||
      needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-postgres

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Run migrations
        run: |
          cd backend
          DB_NAME=sentinelx_test alembic upgrade head
          PGPASSWORD=postgres psql -h localhost -U postgres -d sentinelx_test -c "\dt"

      - name: Run tests
        run: |
          cd backend
          pytest tests/ -v --tb=short

  # ============ 前端构建测试 ============
  frontend-test:
    needs: changes
    if: |
      github.event_name != 'pull_request' ||
      needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  # ============ Docker构建测试 ============
  docker-test:
    needs: changes
    if: |
      github.event_name != 'pull_request' ||
      needs.changes.outputs.docker == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile
          push: false
          tags: sentinelx/backend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile.frontend
          push: false
          tags: sentinelx/frontend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build postgres image
        uses: docker/build-push-action@v5
        with:
          context: ./docker
          file: ./docker/Dockerfile.pg
          push: false
          tags: sentinelx/postgres:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============ Helm Chart 校验 ============
  helm-test:
    needs: changes
    if: |
      github.event_name != 'pull_request' ||
      needs.changes.outputs.helm == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.2

      - name: Helm lint
        run: |
          helm lint helm/sentinelx \
            --set secrets.jwtSecretKey=test-secret \
            --set secrets.dbPassword=test-password

      - name: Helm template render (auto-generated secrets)
        run: |
          helm template sentinelx helm/sentinelx -n sentinelx > /tmp/sentinelx-rendered.yaml
          grep -q 'kind: Deployment' /tmp/sentinelx-rendered.yaml
          grep -qE 'DB_HOST: "?postgres"?' /tmp/sentinelx-rendered.yaml
          grep -q 'JWT_SECRET_KEY:' /tmp/sentinelx-rendered.yaml
          grep -q 'DB_PASSWORD:' /tmp/sentinelx-rendered.yaml
          grep -q 'sentinelx.io/auto-generated: "true"' /tmp/sentinelx-rendered.yaml

      - name: Helm template render (explicit secrets)
        run: |
          helm template sentinelx helm/sentinelx -n sentinelx \
            --set secrets.jwtSecretKey=test-secret \
            --set secrets.dbPassword=test-password \
            > /tmp/sentinelx-explicit.yaml
          grep -q 'JWT_SECRET_KEY: "test-secret"' /tmp/sentinelx-explicit.yaml
          grep -q 'DB_PASSWORD: "test-password"' /tmp/sentinelx-explicit.yaml

      - name: Helm template (external DB mode)
        run: |
          helm template sentinelx helm/sentinelx -n sentinelx \
            -f helm/sentinelx/values-production.yaml \
            --set secrets.jwtSecretKey=test-secret \
            --set secrets.dbPassword=test-password \
            --set backend.externalDbHost=db.example.com \
            --set backend.externalRedisHost=redis.example.com \
            > /tmp/sentinelx-prod.yaml
          ! grep -q 'kind: StatefulSet' /tmp/sentinelx-prod.yaml
          grep -qE 'DB_HOST: "?db\.example\.com"?' /tmp/sentinelx-prod.yaml
