name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: '3.11'

jobs:
  # ============ 后端测试 ============
  backend-test:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Build and start postgres
        run: |
          docker build -t sentinelx/postgres:test -f docker/Dockerfile.pg docker/
          docker run -d --name postgres \
            -e POSTGRES_USER=postgres \
            -e POSTGRES_PASSWORD=postgres \
            -e POSTGRES_DB=sentinelx_test \
            -p 5432:5432 \
            sentinelx/postgres:test
          until docker exec postgres pg_isready -U postgres; do sleep 1; done

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov httpx

      - name: Run migrations
        run: |
          cd backend
          DB_NAME=sentinelx_test alembic upgrade head

      - name: Run tests
        run: |
          cd backend
          pytest tests/ -v --tb=short --cov=apps --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./backend/coverage.xml
          flags: unittests
          name: codecov-backend

  # ============ 前端构建测试 ============
  frontend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  # ============ Docker构建测试 ============
  docker-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile
          push: false
          tags: sentinelx/backend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile.frontend
          push: false
          tags: sentinelx/frontend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build postgres image
        uses: docker/build-push-action@v5
        with:
          context: ./docker
          file: ./docker/Dockerfile.pg
          push: false
          tags: sentinelx/postgres:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============ 数据库迁移测试 ============
  migration-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build and start postgres
        run: |
          docker build -t sentinelx/postgres:test -f docker/Dockerfile.pg docker/
          docker run -d --name postgres \
            -e POSTGRES_USER=postgres \
            -e POSTGRES_PASSWORD=postgres \
            -e POSTGRES_DB=sentinelx_test \
            -p 5432:5432 \
            sentinelx/postgres:test
          until docker exec postgres pg_isready -U postgres; do sleep 1; done

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install alembic

      - name: Run migrations
        run: |
          cd backend
          DB_NAME=sentinelx_test alembic upgrade head

      - name: Verify tables created
        run: |
          PGPASSWORD=postgres psql -h localhost -U postgres -d sentinelx_test -c "\dt"

  # ============ Helm Chart 校验 ============
  helm-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.2

      - name: Helm lint
        run: |
          helm lint helm/sentinelx \
            --set secrets.jwtSecretKey=test-secret \
            --set secrets.dbPassword=test-password

      - name: Helm template render
        run: |
          helm template sentinelx helm/sentinelx -n sentinelx \
            --set secrets.jwtSecretKey=test-secret \
            --set secrets.dbPassword=test-password \
            > /tmp/sentinelx-rendered.yaml
          grep -q 'kind: Deployment' /tmp/sentinelx-rendered.yaml
          grep -q 'DB_HOST: postgres' /tmp/sentinelx-rendered.yaml

      - name: Helm template (external DB mode)
        run: |
          helm template sentinelx helm/sentinelx -n sentinelx \
            -f helm/sentinelx/values-production.yaml \
            --set secrets.jwtSecretKey=test-secret \
            --set secrets.dbPassword=test-password \
            --set backend.externalDbHost=db.example.com \
            --set backend.externalRedisHost=redis.example.com \
            > /tmp/sentinelx-prod.yaml
          ! grep -q 'kind: StatefulSet' /tmp/sentinelx-prod.yaml
          grep -q 'DB_HOST: db.example.com' /tmp/sentinelx-prod.yaml
