apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "sentinelx.frontend.nginxConfigMapName" . }}
  namespace: {{ include "sentinelx.namespace" . }}
  labels:
    {{- include "sentinelx.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
data:
  default.conf: |
    server {
        listen 80;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        # Defer upstream DNS resolution to request time so nginx can start
        # before the backend Service/endpoints are ready.
        resolver kube-dns.kube-system.svc.cluster.local valid=10s ipv6=off;

        location /api/ {
            set $backend_host {{ include "sentinelx.backend.serviceHost" . }};
            proxy_pass http://$backend_host:80$request_uri;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /health/ {
            set $backend_host {{ include "sentinelx.backend.serviceHost" . }};
            proxy_pass http://$backend_host:80$request_uri;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }

        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
