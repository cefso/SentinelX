apiVersion: v1
kind: Secret
metadata:
  name: {{ include "sentinelx.secretName" . }}
  namespace: {{ include "sentinelx.namespace" . }}
  labels:
    {{- include "sentinelx.labels" . | nindent 4 }}
  annotations:
    sentinelx.io/auto-generated: {{ .Values.secrets.autoGenerate | quote }}
type: Opaque
stringData:
  DB_USER: {{ include "sentinelx.dbUser" . | quote }}
  DB_PASSWORD: {{ include "sentinelx.dbPassword" . | quote }}
  JWT_SECRET_KEY: {{ include "sentinelx.jwtSecretKey" . | quote }}
  {{- $adminPassword := include "sentinelx.defaultAdminPassword" . }}
  {{- if $adminPassword }}
  DEFAULT_ADMIN_PASSWORD: {{ $adminPassword | quote }}
  {{- end }}
