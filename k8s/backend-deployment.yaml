apiVersion: apps/v1
kind: Deployment
metadata:
  name: sentinelx-backend
  namespace: sentinelx
  labels:
    app: sentinelx
    component: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sentinelx
      component: backend
  template:
    metadata:
      labels:
        app: sentinelx
        component: backend
    spec:
      containers:
      - name: backend
        image: sentinelx/backend:latest
        command: ["sh", "-c", "alembic upgrade head && uvicorn main:app --host 0.0.0.0 --port 8000"]
        ports:
        - containerPort: 8000
        env:
        - name: APP_NAME
          value: "SentinelX"
        - name: DEBUG
          value: "false"
        - name: DB_HOST
          value: "postgres"
        - name: DB_PORT
          value: "5432"
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: sentinelx-secrets
              key: DB_USER
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: sentinelx-secrets
              key: DB_PASSWORD
        - name: DB_NAME
          value: "sentinelx"
        - name: REDIS_HOST
          value: "redis"
        - name: REDIS_PORT
          value: "6379"
        - name: JWT_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: sentinelx-secrets
              key: JWT_SECRET_KEY
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health/live
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: sentinelx-backend
  namespace: sentinelx
spec:
  selector:
    app: sentinelx
    component: backend
  ports:
  - port: 80
    targetPort: 8000
  type: ClusterIP
