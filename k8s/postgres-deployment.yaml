# SentinelX PostgreSQL + TimescaleDB 部署配置
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: sentinelx-postgres
  namespace: sentinelx
  labels:
    app: sentinelx
    component: postgres
spec:
  serviceName: sentinelx-postgres
  replicas: 1
  selector:
    matchLabels:
      app: sentinelx
      component: postgres
  template:
    metadata:
      labels:
        app: sentinelx
        component: postgres
    spec:
      containers:
      - name: postgres
        image: timescale/timescaledb:latest-pg16
        ports:
        - containerPort: 5432
          name: postgres
        env:
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: sentinelx-secrets
              key: DB_USER
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: sentinelx-secrets
              key: DB_PASSWORD
        - name: POSTGRES_DB
          value: sentinelx
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        volumeMounts:
        - name: postgres-data
          mountPath: /var/lib/postgresql/data
        livenessProbe:
          exec:
            command: ["pg_isready", "-U", "postgres"]
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          exec:
            command: ["pg_isready", "-U", "postgres"]
          initialDelaySeconds: 5
          periodSeconds: 5
  volumeClaimTemplates:
  - metadata:
      name: postgres-data
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 20Gi
---
apiVersion: v1
kind: Service
metadata:
  name: sentinelx-postgres
  namespace: sentinelx
spec:
  clusterIP: None
  selector:
    app: sentinelx
    component: postgres
  ports:
  - port: 5432
    targetPort: 5432
    name: postgres
