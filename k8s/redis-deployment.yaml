# SentinelX Redis 部署配置
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: sentinelx-redis
  namespace: sentinelx
  labels:
    app: sentinelx
    component: redis
spec:
  serviceName: sentinelx-redis
  replicas: 1
  selector:
    matchLabels:
      app: sentinelx
      component: redis
  template:
    metadata:
      labels:
        app: sentinelx
        component: redis
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379
          name: redis
        command:
        - redis-server
        - --appendonly
        - "yes"
        - --maxmemory
        - 256mb
        - --maxmemory-policy
        - allkeys-lru
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        volumeMounts:
        - name: redis-data
          mountPath: /data
        livenessProbe:
          exec:
            command: ["redis-cli", "ping"]
          initialDelaySeconds: 15
          periodSeconds: 10
        readinessProbe:
          exec:
            command: ["redis-cli", "ping"]
          initialDelaySeconds: 5
          periodSeconds: 5
  volumeClaimTemplates:
  - metadata:
      name: redis-data
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: sentinelx-redis
  namespace: sentinelx
spec:
  clusterIP: None
  selector:
    app: sentinelx
    component: redis
  ports:
  - port: 6379
    targetPort: 6379
    name: redis
