apiVersion: apps/v1
kind: Deployment
metadata:
  name: sentinelx-frontend
  namespace: sentinelx
  labels:
    app: sentinelx
    component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sentinelx
      component: frontend
  template:
    metadata:
      labels:
        app: sentinelx
        component: frontend
    spec:
      containers:
      - name: frontend
        image: sentinelx/frontend:latest
        ports:
        - containerPort: 3000
        env:
        - name: VITE_API_BASE_URL
          value: "/api/v1"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: sentinelx-frontend
  namespace: sentinelx
spec:
  selector:
    app: sentinelx
    component: frontend
  ports:
  - port: 80
    targetPort: 3000
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sentinelx-ingress
  namespace: sentinelx
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
spec:
  ingressClassName: nginx
  rules:
  - host: sentinelx.example.com
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: sentinelx-backend
            port:
              number: 80
      - path: /
        pathType: Prefix
        backend:
          service:
            name: sentinelx-frontend
            port:
              number: 80
